<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MPAL Coach</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📚 MPAL Coach</h1>

<div class="card">
  <p>Progresso de estudo:</p>
  <button onclick="marcar()">Marcar como estudado</button>
  <p id="status">Nada marcado ainda</p>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCGTCgmZiRv3HLGwQttSQGd63znsVJ_RK8",
  authDomain: "mpal-coach.firebaseapp.com",
  databaseURL: "https://mpal-coach-default-rtdb.firebaseio.com",
  projectId: "mpal-coach",
  storageBucket: "mpal-coach.firebasestorage.app",
  messagingSenderId: "693674924860",
  appId: "1:693674924860:web:ece9d898de259234661c39"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let state = {};

// carregar do firebase
function carregar() {
  db.ref("amanda").once("value").then(snapshot => {
    if (snapshot.exists()) {
      state = snapshot.val();
      document.getElementById("status").innerText = state.status || "Nada marcado";
      console.log("✅ carregado");
    }
  });
}

// salvar
function salvar() {
  db.ref("amanda").set(state);
  console.log("💾 salvo");
}

// ação
function marcar() {
  state.status = "Estudado hoje ✅";
  document.getElementById("status").innerText = state.status;
  salvar();
}

// iniciar
carregar();
</script>

</body>
</html>
