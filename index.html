<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>MPAL Coach</title>
</head>
<body>

<!-- SEU CONTEÚDO ORIGINAL PERMANECE AQUI -->

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCGTCgmZiRv3HLGwQttSQGd63znsVJ_RK8",
  authDomain: "mpal-coach.firebaseapp.com",
  databaseURL: "https://mpal-coach-default-rtdb.firebaseio.com",
  projectId: "mpal-coach",
  storageBucket: "mpal-coach.firebasestorage.app",
  messagingSenderId: "693674924860",
  appId: "1:693674924860:web:ece9d898de259234661c39"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ESTADO GLOBAL
let state = {};

// 🔽 CARREGAR DO FIREBASE
function loadState() {
  return db.ref("amanda").once("value").then(snapshot => {
    if (snapshot.exists()) {
      state = snapshot.val();
      console.log("✅ Dados carregados do Firebase");
    } else {
      state = {};
      console.log("⚠️ Nenhum dado encontrado");
    }
  });
}

// 🔼 SALVAR NO FIREBASE
function saveState() {
  db.ref("amanda").set(state);
  console.log("💾 Salvo no Firebase");
}

// 🧠 INTERCEPTAR localStorage (sem quebrar seu código antigo)
const originalSetItem = localStorage.setItem;
localStorage.setItem = function(key, value) {
  originalSetItem.apply(this, arguments);
  try {
    state[key] = JSON.parse(value);
  } catch {
    state[key] = value;
  }
  saveState();
};

// 🔁 AO INICIAR
loadState().then(() => {
  // joga dados carregados de volta no localStorage
  Object.keys(state).forEach(key => {
    localStorage.setItem(key, JSON.stringify(state[key]));
  });
});
</script>

</body>
</html>
